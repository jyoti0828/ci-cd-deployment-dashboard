version: "3.9"

services:
  flask-app:
    build: .
    image: flask-docker-app:local
    container_name: flask-app
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
